<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFBA08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HanziHero">
<meta name="description" content="Learn Chinese characters with stroke order, pronunciation tests and fun games!">
<title>🐼 ZiZi — Learn Chinese!</title>

<link rel="apple-touch-icon" href="icon-192.png">
<style>/* ═══════════════════════════════════════
   HANZIHERO — STYLESHEET
═══════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --primary:#FF6B35; --secondary:#FFD166; --green:#06D6A0; --blue:#118AB2;
  --purple:#845EC2; --red:#EF233C; --pink:#FF9EBB; --bg:#FFF7ED;
  --shadow:0 5px 0 rgba(0,0,0,0.13); --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Baloo 2',cursive;background:var(--bg);min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent}

/* CLOUDS */
.cloud{position:fixed;background:white;border-radius:50px;opacity:.45;pointer-events:none;z-index:0}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%}
.c1{width:120px;height:38px;top:6%;left:-10px;animation:cmove 24s linear infinite}
.c1::before{width:60px;height:60px;top:-30px;left:14px}
.c1::after{width:40px;height:40px;top:-18px;left:55px}
.c2{width:160px;height:48px;top:20%;left:70%;animation:cmove 32s linear infinite 7s}
.c2::before{width:80px;height:80px;top:-40px;left:20px}
.c2::after{width:54px;height:54px;top:-24px;left:78px}
.c3{width:100px;height:32px;top:60%;left:40%;animation:cmove 20s linear infinite 3s}
.c3::before{width:50px;height:50px;top:-26px;left:10px}
.c3::after{width:34px;height:34px;top:-14px;left:48px}
@keyframes cmove{from{transform:translateX(120vw)}to{transform:translateX(-340px)}}

/* HEADER */
header{position:relative;z-index:10;text-align:center;padding:16px 20px 12px;
  background:linear-gradient(180deg,#FFD166,#FFBA08);border-bottom:5px solid #E8A000;
  box-shadow:0 4px 0 rgba(0,0,0,.1)}
header h1{font-size:clamp(1.5rem,5vw,2.4rem);color:#7B2D00;text-shadow:2px 2px 0 rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;gap:8px}
.pwa-install-btn{background:#7B2D00;color:var(--secondary);border:none;border-radius:12px;
  padding:6px 14px;font-family:'Baloo 2',cursive;font-size:.8rem;font-weight:800;cursor:pointer;
  margin-left:8px;display:none}
.pwa-install-btn.show{display:inline-block}
.hdr-stats{display:flex;justify-content:center;gap:14px;margin-top:5px;font-size:.85rem;font-weight:700;
  color:#8B4000;flex-wrap:wrap}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:white;border-top:3px solid #FFD166;
  display:flex;justify-content:space-around;align-items:stretch;
  box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 10px;cursor:pointer;transition:all .2s;border:none;background:none;
  font-family:'Baloo 2',cursive;color:#aaa;font-size:.68rem;font-weight:700;gap:2px;
  border-top:3px solid transparent}
.bnav .icon{font-size:1.4rem;line-height:1}
.bnav.active{color:var(--primary);border-top-color:var(--primary)}

/* CONTENT */
.content{position:relative;z-index:5;max-width:860px;margin:0 auto;padding:18px 14px 90px}
.pane{display:none}.pane.active{display:block}

/* CHAPTER GRID */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:14px}
.ch-card{background:white;border-radius:var(--radius);padding:18px 14px;text-align:center;cursor:pointer;
  border:3px solid transparent;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden}
.ch-card:hover{transform:translateY(-4px)}
.ch-card:active{transform:translateY(0)}
.ch-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.ch-type-badge{display:inline-block;font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:8px;
  background:#F0F0F0;color:#888;margin-bottom:6px}
.ch-type-badge.sentence{background:#E8F4FF;color:var(--blue)}
.ch-chars{font-family:'Noto Sans SC',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;
  line-height:1.7;color:#333;margin-bottom:6px}
.ch-subtitle{font-size:.72rem;color:#aaa;margin-bottom:8px;font-style:italic}
.ch-prog-row{display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:8px;background:#eee;border-radius:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--green),#34D399);transition:width .4s}

/* LEARN */
.learn-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{background:white;border:3px solid #ddd;border-radius:50%;width:42px;height:42px;
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--primary);transform:scale(1.08)}

.char-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cnav{font-family:'Noto Sans SC',sans-serif;font-size:1.2rem;font-weight:700;
  min-width:46px;height:46px;padding:0 6px;border-radius:12px;border:3px solid #ddd;background:white;
  cursor:pointer;transition:all .2s;box-shadow:0 3px 0 #ddd;display:flex;align-items:center;
  justify-content:center;position:relative;font-family:'Noto Sans SC',sans-serif}
.cnav:hover{transform:translateY(-2px)}
.cnav.active{border-color:var(--primary);background:#FFF0E8;box-shadow:0 3px 0 var(--primary)}
.cnav.mastered::after{content:'⭐';position:absolute;top:-8px;right:-5px;font-size:11px}
.cnav.partial::after{content:'~';position:absolute;top:-6px;right:-5px;background:var(--secondary);
  color:#7B2D00;border-radius:50%;width:16px;height:16px;font-size:8px;display:flex;
  align-items:center;justify-content:center;font-family:sans-serif;font-weight:700}

/* CARDS */
.card{background:white;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
  border:3px solid var(--secondary);margin-bottom:14px}
.card.blue{border-color:#BAE6FD;background:#F0F9FF}
.card.green{border-color:#A7F3D0;background:#F0FFF9}
.card.purple{border-color:#DDD6FE;background:#F8F0FF}
.card.pink{border-color:#FBCFE8;background:#FFF0F8}
.card-title{font-size:.95rem;font-weight:800;color:#555;margin-bottom:12px;display:flex;align-items:center;gap:7px}

.big-char-wrap{text-align:center;padding:6px 0 12px}
.big-char{font-family:'Noto Sans SC',sans-serif;font-size:clamp(4rem,15vw,6.5rem);font-weight:900;
  line-height:1;color:#1A1A2E;cursor:pointer;transition:transform .15s;display:inline-block;
  text-shadow:3px 3px 0 rgba(255,107,53,.1)}
.big-char:hover{transform:scale(1.07)}
.char-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{background:#FFF0E8;border:2px solid var(--secondary);border-radius:14px;padding:4px 12px;
  font-size:.9rem;font-weight:700;color:#8B4000}
.pill.py{font-size:1.15rem;color:var(--primary)}
.pill.en{background:#EFF9FF;border-color:#BAE6FD;color:#0369A1}
.char-meaning-full{text-align:center;font-size:.9rem;color:#666;margin-top:6px;padding:8px 12px;
  background:#FFFBEB;border-radius:10px;border:1px solid #FFE59A}
.char-tip{text-align:center;color:#aaa;font-size:.82rem;font-style:italic;margin-top:6px}

/* STEP BADGES */
.steps-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.sbadge{display:flex;align-items:center;gap:5px;background:white;border:2px solid #ddd;
  border-radius:18px;padding:5px 12px;font-size:.82rem;font-weight:700;color:#bbb}
.sbadge.done{border-color:var(--green);background:#ECFDF5;color:#065F46}
.sbadge.now{border-color:var(--primary);background:#FFF0E8;color:var(--primary)}
.sbadge .sn{width:20px;height:20px;border-radius:50%;background:#ddd;display:flex;
  align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0}
.sbadge.done .sn{background:var(--green);color:white}
.sbadge.now .sn{background:var(--primary);color:white}

/* HANZI WRITER */
.writer-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.writer-box{border:3px solid #ddd;border-radius:16px;background:white;overflow:hidden;
  position:relative}
.writer-box.quiz{border-color:var(--purple)}
.wrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.wbtn{background:white;border:3px solid #ddd;border-radius:12px;padding:8px 14px;
  font-family:'Baloo 2',cursive;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;
  box-shadow:0 3px 0 #ccc}
.wbtn:hover{transform:translateY(-1px)}
.wbtn:active{transform:translateY(1px);box-shadow:0 1px 0 #ccc}
.wbtn.blue{background:var(--blue);color:white;border-color:var(--blue);box-shadow:0 3px 0 #0A6B8A}
.wbtn.red{background:var(--red);color:white;border-color:var(--red);box-shadow:0 3px 0 #A0001C}
.wbtn.green{background:var(--green);color:white;border-color:var(--green);box-shadow:0 3px 0 #04A07A}

.sstatus{text-align:center;font-size:.9rem;font-weight:700;padding:9px 14px;
  border-radius:12px;margin-top:7px;min-height:42px;display:flex;align-items:center;
  justify-content:center;gap:5px;line-height:1.3}
.sstatus.hint{background:#FFF8E8;color:#8B4000;border:2px solid var(--secondary)}
.sstatus.ok{background:#ECFDF5;color:#065F46;border:2px solid var(--green)}
.sstatus.bad{background:#FFF5F5;color:#991B1B;border:2px solid var(--red)}
.sstatus.done{background:#F0F9FF;color:#0369A1;border:2px solid var(--blue)}
.qprog{font-size:.82rem;color:#aaa;text-align:center;margin-top:4px}

/* STROKE SOUND INDICATOR */
.stroke-sound-fx{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:3rem;z-index:300;pointer-events:none;transition:all .15s;opacity:0}
.stroke-sound-fx.pop{transform:translate(-50%,-50%) scale(1.4);opacity:1}

/* PRONUNCIATION */
.hear-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.hbtn{background:var(--blue);color:white;border:none;border-radius:13px;padding:10px 18px;
  font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 #0A6B8A;transition:all .15s;display:flex;align-items:center;gap:6px}
.hbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #0A6B8A}
.hbtn.slow{background:#5E9E60;box-shadow:0 4px 0 #3D7B3F}
.tone-info{font-size:.82rem;color:#666;background:#FFF8E8;border-radius:10px;padding:7px 12px;
  border:1px solid #FFE59A;line-height:1.5}

.rbtn{width:100%;background:var(--red);color:white;border:none;border-radius:14px;padding:13px;
  font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 #A0001C;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.rbtn:active{transform:translateY(3px);box-shadow:0 2px 0 #A0001C}
.rbtn.rec{background:#444;box-shadow:0 5px 0 #111;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.rresult{margin-top:10px;padding:12px;border-radius:12px;font-size:.9rem;font-weight:700;
  text-align:center;line-height:1.5;display:none}
.rresult.pass{background:#ECFDF5;color:#065F46;border:2px solid var(--green);display:block}
.rresult.fail{background:#FFF5F5;color:#991B1B;border:2px solid var(--red);display:block}
.rresult.wait{background:#f5f5f5;color:#555;border:2px solid #ddd;display:block}

/* LOCK */
.lock-gate{background:#f5f5f5;border-radius:14px;padding:18px;text-align:center;border:3px dashed #ddd}

/* MASTER BADGE */
.master-badge{border-radius:16px;padding:13px;text-align:center;font-weight:800;font-size:1rem;
  margin-top:10px;animation:shine 2s ease-in-out infinite}
@keyframes shine{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}

/* SENTENCE CARD */
.sent-card{background:white;border-radius:var(--radius);padding:18px;border:3px solid var(--blue);
  box-shadow:var(--shadow);margin-bottom:14px;cursor:pointer;transition:all .2s}
.sent-card:hover{transform:translateY(-3px)}
.sent-zh{font-family:'Noto Sans SC',sans-serif;font-size:2rem;font-weight:900;color:#1A1A2E;margin-bottom:4px}
.sent-py{font-size:.95rem;color:var(--primary);font-weight:700;margin-bottom:4px}
.sent-en{font-size:.95rem;color:#555;margin-bottom:8px}
.sent-tip{font-size:.8rem;color:#aaa;font-style:italic}
.sent-chars{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.sent-char-pill{font-family:'Noto Sans SC',sans-serif;background:#F0F9FF;border:2px solid #BAE6FD;
  border-radius:10px;padding:4px 10px;font-size:.9rem;font-weight:700;color:#0369A1;
  display:flex;align-items:center;gap:4px}
.sent-char-pill small{font-family:'Baloo 2',cursive;color:#888;font-size:.72rem}
.sent-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* GAMES */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.gcard{background:white;border-radius:var(--radius);padding:20px 14px;text-align:center;cursor:pointer;
  border:3px solid #ddd;box-shadow:var(--shadow);transition:all .2s}
.gcard:hover{transform:translateY(-4px)}
.gcard:active{transform:translateY(0)}
.gicon{font-size:2.4rem;margin-bottom:7px}
.gname{font-size:.95rem;font-weight:800;color:#333;margin-bottom:2px}
.gdesc{font-size:.75rem;color:#aaa}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;
  align-items:center;justify-content:center;padding:14px}
.modal.open{display:flex}
.mbox{background:white;border-radius:24px;padding:24px;max-width:540px;width:100%;
  max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mclose{position:absolute;top:12px;right:12px;background:#f0f0f0;border:none;
  border-radius:50%;width:32px;height:32px;font-size:1rem;cursor:pointer;font-weight:800;
  display:flex;align-items:center;justify-content:center}
.mclose:hover{background:#fdd}

/* GAME UI */
.gtitle{font-size:1.3rem;font-weight:800;color:#333;margin-bottom:3px}
.gscore{font-size:.9rem;color:#888;margin-bottom:16px}
.gchar{font-family:'Noto Sans SC',sans-serif;font-size:4rem;font-weight:900;
  text-align:center;color:#1A1A2E;margin-bottom:4px;cursor:pointer;line-height:1}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px}
.gopt{background:#F8F8F8;border:3px solid #ddd;border-radius:13px;padding:12px 8px;
  font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;
  color:#333;font-family:'Baloo 2',cursive;line-height:1.3}
.gopt:hover{border-color:var(--blue);background:#EFF9FF}
.gopt.ok{border-color:var(--green);background:#ECFDF5;color:#065F46;animation:popIn .3s ease}
.gopt.bad{border-color:var(--red);background:#FFF5F5;color:#991B1B;animation:shake .3s ease}
.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.fopt{font-family:'Noto Sans SC',sans-serif;font-size:1.8rem;font-weight:900;
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:#F8F8F8;border:3px solid #ddd;border-radius:13px;cursor:pointer;transition:all .2s}
.fopt:hover{border-color:var(--purple);background:#F8F0FF;transform:scale(1.05)}
.fopt.ok{border-color:var(--green);background:#ECFDF5;animation:popIn .3s ease}
.fopt.bad{border-color:var(--red);background:#FFF5F5;animation:shake .3s ease}
.gres{text-align:center;padding:14px;border-radius:14px;margin-top:10px;font-size:.95rem;font-weight:700}
.gres.pass{background:#ECFDF5;color:#065F46;border:3px solid var(--green)}
.gres.fail{background:#FFF5F5;color:#991B1B;border:3px solid var(--red)}
.gres .be{font-size:2.4rem;display:block;margin-bottom:5px}
.nbtn{width:100%;background:var(--primary);color:white;border:none;border-radius:13px;
  padding:12px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;cursor:pointer;
  box-shadow:0 4px 0 #C04A1E;transition:all .15s;margin-top:9px}
.nbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #C04A1E}

@keyframes popIn{0%{transform:scale(.9)}60%{transform:scale(1.07)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* PROGRESS */
.psec{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px}
.pstitle{font-size:.95rem;font-weight:800;color:#333;margin-bottom:9px}
.cdots{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.cdot{font-family:'Noto Sans SC',sans-serif;font-size:.82rem;font-weight:700;
  min-width:38px;height:38px;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#f0f0f0;color:#bbb;border:2px solid #ddd;
  gap:0;padding:2px}
.cdot small{font-family:'Baloo 2',cursive;font-size:.46rem;line-height:1;color:#aaa}
.cdot.wonly{border-color:#845EC2;background:#F8F0FF;color:#845EC2}
.cdot.sonly{border-color:var(--secondary);background:#FFFBEB;color:#8B4000}
.cdot.both{border-color:var(--green);background:#ECFDF5;color:#065F46}

/* CELEBRATION */
.cel{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;flex-direction:column}
.cel.show{display:flex}
.celbox{background:white;border-radius:26px;padding:34px 26px;text-align:center;max-width:330px;
  animation:bounceIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@keyframes bounceIn{0%{transform:scale(.4)}70%{transform:scale(1.08)}100%{transform:scale(1)}}
.cp{position:fixed;pointer-events:none;z-index:201;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(-80px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* TOAST */
#toast{display:none;position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:#333;color:white;padding:10px 20px;border-radius:18px;font-size:.88rem;
  z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.3);text-align:center;max-width:300px;
  font-weight:700;pointer-events:none}

@keyframes strokeNamePop {
  0%  { transform: scale(0.85); opacity: 0.4; }
  60% { transform: scale(1.06); opacity: 1; }
  100%{ transform: scale(1);    opacity: 1; }
}
@keyframes countdown {
  from { width: 100%; }
  to   { width: 0%; }
}

.div{height:2px;background:linear-gradient(90deg,transparent,#FFD166,transparent);margin:12px 0}

/* OFFLINE BANNER */
#offline-banner{display:none;background:#EF233C;color:white;text-align:center;
  padding:6px;font-size:.82rem;font-weight:700;position:fixed;top:0;left:0;right:0;z-index:500}

@media(max-width:420px){
  .cnav{min-width:40px;height:40px;font-size:1rem}
  .fgrid{grid-template-columns:repeat(3,1fr)}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>

<div id="offlineBanner" style="display:none;background:#EF233C;color:white;text-align:center;padding:6px;font-size:.82rem;font-weight:700;position:fixed;top:0;left:0;right:0;z-index:500">
  📵 You're offline — some features may not work
</div>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<header>
  <h1>
    🐼 HanziHero!
    <button class="pwa-install-btn" id="installBtn" onclick="installApp()">📲 Install App</button>
  </h1>
  <div class="hdr-stats">
    <span>⭐ <span id="hStars">0</span></span>
    <span>✅ <span id="hMastered">0</span> Mastered</span>
    <span>✏️ <span id="hWrite">0</span> Write</span>
    <span>🎤 <span id="hSpeak">0</span> Speak</span>
  </div>
</header>

<!-- MAIN CONTENT -->
<div class="content">

<script>// ═══════════════════════════════════════════════════════

function getStatus(c) {

}

// ── STROKE NAME LOOKUP TABLE (Accurate per character) ─────────────────
const STROKE_ORDER = {
  '田': ['s', 'hz', 'h', 's', 'h'],
  '刀': ['hzg', 'p'],
  '在': ['h', 'p', 's', 'h', 's', 'h'],
  '上': ['s', 'h', 'h'],
  '下': ['h', 's', 'd'],
  '大': ['h', 'p', 'n'],

  '一': ['h'],
  '十': ['h', 's'],
  '': ['s', 'p', 'n'],
  '人': ['p', 'n'],
  '口': ['h', 's', 's', 'h'],
  '火': ['p', 'p', 'd', 'd'],
  '月': ['h', 's', 'h', 's', 'h'],
  '水': ['p', 's', 'p', 'n'],
  // Add more characters as needed
};

// Fallback names
const STROKE_NAMES = {
  'h':  { zh: '横', py: 'Héng', en: 'Horizontal' },
  's':  { zh: '竖', py: 'Shù',   en: 'Vertical' },
  'p':  { zh: '撇', py: 'Piě',   en: 'Left-falling' },
  'n':  { zh: '捺', py: 'Nà',    en: 'Right-falling' },

  'hg': { zh: '横钩', py: 'Héng Gōu', en: 'Horizontal Hook' },
  'sg': { zh: '竖钩', py: 'Shù Gōu', en: 'Vertical Hook' },
  'hzg': { zh: '横折钩', py: 'Héng Zhé Gōu', en: 'Horizontal bend with hook'},
   
  'unknown': { zh: '笔画', py: 'Bǐ Huà', en: 'Stroke' }
};

function getStrokeInfo(strokeIndex) {
  const char = curCh?.chars?.[curIdx];
  if (!char) return STROKE_NAMES['unknown'];

  const strokeTypes = STROKE_ORDER[char];
  if (strokeTypes && strokeTypes[strokeIndex]) {
    const key = strokeTypes[strokeIndex];
    return STROKE_NAMES[key] || STROKE_NAMES['unknown'];
  }

  // Fallback to old method if not in table yet
  if (currentCharData?.medians?.[strokeIndex]) {
    return classifyStrokeByPath(currentCharData.medians[strokeIndex]); // keep old function as backup
  }

  return STROKE_NAMES['unknown'];
}

// Keep your existing announceStroke (just make sure it uses the new getStrokeInfo)
function announceStroke(strokeIndex) {
  const info = getStrokeInfo(strokeIndex);
  if (!info) return;

  const el = document.getElementById('strokeNameDisplay');
  if (el) {
    el.innerHTML = `
      <span style="font-family:'Noto Sans SC',sans-serif;font-size:1.5rem;font-weight:900;color:#845EC2">${info.zh}</span>
      <span style="font-size:1.1rem;font-weight:800;color:var(--primary)">${info.py}</span>
      <span style="font-size:0.9rem;color:#555">${info.en}</span>
    `;
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = 'strokeNamePop .45s ease';
  }

  speakStrokeName(info.zh);
}
function speakStrokeName(text) {
  try {
    // Try Web Speech (faster for short words)
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN'; u.rate = 1.0; u.volume = 0.9;
      const v = window.speechSynthesis.getVoices().find(x => x.lang.startsWith('zh'));
      if (v) { u.voice = v; window.speechSynthesis.speak(u); return; }
    }
    // Fallback: Google TTS
    const a = new Audio(`https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=zh-CN&client=gtx&q=${encodeURIComponent(text)}`);
    a.volume = 0.8;
    a.play().catch(() => {});
  } catch(e) {}
}

// ── AUDIO CONTEXT FOR STROKE SOUNDS ──────────────────
function getAudioCtx() {
  if (!AudioCtx) AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return AudioCtx;
}

function playStrokeSound(correct) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (correct) {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.28, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } else {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.22, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.18);
    }

    const fx = document.getElementById('strokeFx');
    if (fx) {
      fx.textContent = correct ? '✅' : '❌';
      fx.classList.add('pop');
      setTimeout(() => fx.classList.remove('pop'), 300);
    }
  } catch (e) {}
}

function playCompleteSound() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + i * 0.1 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.28);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.3);
    });
  } catch (e) {}
}

// ── CHAPTERS ─────────────────────────────────────────
function renderChs() {
  const charChs = CHAPTERS.filter(c => !c.isSentence);
  const sentChs = CHAPTERS.filter(c => c.isSentence);

  let html = `<div style="font-size:1rem;font-weight:800;color:#555;margin-bottom:10px">📖 Character Chapters</div>
    <div class="ch-grid">
    ${charChs.map(ch => chCardHTML(ch)).join('')}

    <div style="font-size:1rem;font-weight:800;color:#555;margin:18px 0 10px">💬 Sentence Chapters</div>
    <div class="ch-grid">
    ${sentChs.map(ch => chCardHTML(ch)).join('')}
    </div>`;
  document.getElementById('pane-chapters').innerHTML = html;
}

function chCardHTML(ch) {
  if (ch.isSentence) {
    const done = (S['sent_' + ch.id] || []).length;
    const total = ch.sentences.length;
    const pct = Math.round(done / total * 100);
    return `<div class="ch-card" style="border-color:${ch.color}" onclick="openCh(${ch.id})">
      <div style="font-size:1.4rem;margin-bottom:3px">${ch.emoji}</div>
      <div class="ch-label" style="color:${ch.color}">${ch.title}</div>
      <div class="ch-type-badge sentence">💬 Sentences</div>
      <div class="ch-subtitle">${ch.subtitle}</div>
      <div class="ch-prog-row">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span style="font-size:.72rem;color:#aaa;white-space:nowrap">${done}/${total}</span>
      </div>
    </div>`;
  }
  const done = ch.chars.filter(c => getStatus(c) === 'mastered').length;
  const part = ch.chars.filter(c => getStatus(c) === 'partial').length;
  const pct = Math.round((done + part * 0.5) / ch.chars.length * 100);
  const preview = ch.chars.slice(0, 8);
  return `<div class="ch-card" style="border-color:${ch.color}" onclick="openCh(${ch.id})">
    <div style="font-size:1.4rem;margin-bottom:3px">${ch.emoji}</div>
    <div class="ch-label" style="color:${ch.color}">${ch.title}</div>
    <div class="ch-type-badge">✏️ Characters</div>
    <div class="ch-chars">${preview.slice(0,5).join(' ')}<br>${preview.slice(5).join(' ')}</div>
    <div class="ch-subtitle">${ch.subtitle}</div>
    <div class="ch-prog-row">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span style="font-size:.72rem;color:#aaa;white-space:nowrap">${done}/${ch.chars.length}⭐</span>
    </div>
  </div>`;
}

function renderSentenceChapter(pane) {

function markSent(chId, idx) {

  if (!S[key]) S[key] = [];

    stars++;
    save();
    renderChs();
    renderLearn();
  }
}

function practiceSent(chId, idx, zhEnc, pyEnc, enEnc) {
  const zh = decodeURIComponent(zhEnc);
  const py = decodeURIComponent(pyEnc);
  const en = decodeURIComponent(enEnc);
  spk(zh); // play it first

  setTimeout(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('⚠️ Speech recognition needs Chrome!'); return; }
    showToast('🎤 Listening... say the sentence!', 5000);
    const r = new SR();
    r.lang = 'zh-CN';
    r.maxAlternatives = 5;
    r.onresult = (e) => {
      const heard = Array.from(e.results[0]).map(a => a.transcript);
      const pass = heard.some(h => {
        const hl = h.toLowerCase();
        return zh.split('').some(c => hl.includes(c)) || normTone(hl).includes(normTone(py.split(' ')[0]));
      });
      showToast(pass ? `🎉 Great! "${heard[0]}"` : `😅 I heard: "${heard[0]}" — try again!`, 3000);
    };
    r.onerror = () => showToast('⚠️ Could not hear — try again!');
    r.start();
  }, 1200);
}

// ── HANZI WRITER ──────────────────────────────────────
function loadHW(cb) {
  if (HW) { cb(); return; }
  const urls = [
    'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js',
    'https://unpkg.com/hanzi-writer@3.5.0/dist/hanzi-writer.min.js'
  ];
  function tryLoad(i) {
    if (i >= urls.length) { showToast('⚠️ Could not load stroke library. Check internet.'); return; }
    const s = document.createElement('script');
    s.src = urls[i];
    s.onload = () => { HW = window.HanziWriter; cb(); };
    s.onerror = () => tryLoad(i + 1);
    document.head.appendChild(s);
  }
  tryLoad(0);
}

function hzData(char, onLoad, onError) {
  const urls = [
    `https://cdn.jsdelivr.net/npm/hanzi-writer-data@latest/${encodeURIComponent(char)}.json`,
    `https://unpkg.com/hanzi-writer-data@latest/${encodeURIComponent(char)}.json`
  ];
  function tryUrl(i) {
    if (i >= urls.length) { onError(); return; }
    fetch(urls[i]).then(r => { if (!r.ok) throw 0; return r.json(); }).then(onLoad).catch(() => tryUrl(i + 1));
  }
  tryUrl(0);
}

function initWatch(char) {
  loadHW(() => {
    if (!document.getElementById('watchBox') || !HW) return;
    try {
      watchW = HW.create('watchBox', char, {
        width: 214, height: 214, padding: 16,
        showOutline: true,
        strokeColor: '#1A1A2E',
        outlineColor: '#DDD6FE',
        strokeAnimationSpeed: 0.9,
        delayBetweenStrokes: 600,
        charDataLoader: (c, onLoad, onError) => {
          hzData(c, (data) => {
            currentCharData = data;
            onLoad(data);
          }, onError);
        }
      });
    } catch (e) {}
  });
}

function initQuiz(char) {
  loadHW(() => {
    if (!document.getElementById('quizBox') || !HW) return;
    qDone = 0; qTotal = 0;
    try {
      quizW = HW.create('quizBox', char, {
        width: 214, height: 214, padding: 16,
        showOutline: true, showCharacter: false,
        strokeColor: '#845EC2',
        outlineColor: '#DDD6FE',
        highlightColor: '#06D6A0',
        drawingColor: '#845EC2',
        drawingWidth: 5,
        showHintAfterMisses: 3,
        highlightOnComplete: true,
        charDataLoader: (c, onLoad, onError) => {
          hzData(c, (data) => {
            currentCharData = data;
            onLoad(data);
          }, onError);
        },
        onLoadCharDataSuccess: (data) => {
          qTotal = data.strokes.length;
          updQProg();
          // Announce first stroke name right away
          setTimeout(() => announceStroke(0), 300);
          beginQuiz(char);
        },
        onLoadCharDataError: () => {
          const s = document.getElementById('sstatus');
          if (s) { s.textContent = '⚠️ Stroke data unavailable. Check internet!'; s.className = 'sstatus bad'; }
        }
      });
    } catch (e) {}
  });
}

function beginQuiz(char) {
  if (!quizW) return;
  quizW.quiz({
    onMistake: (d) => {
      playStrokeSound(false);
      const s = document.getElementById('sstatus');
      if (s) {
        s.className = 'sstatus bad';
        const info = getStrokeInfo(d.strokeNum);
        const name = info ? `"${info.py}" (${info.en})` : `stroke ${d.strokeNum + 1}`;
        s.textContent = `❌ Wrong! Draw ${name} — try again! (${d.mistakesOnStroke} mistake${d.mistakesOnStroke > 1 ? 's' : ''})`;
      }
    },
    onCorrectStroke: (d) => {
      playStrokeSound(true);
      qDone = d.strokeNum + 1; updQProg();
      const info = getStrokeInfo(d.strokeNum);
      const s = document.getElementById('sstatus');
      if (s) {
        s.className = 'sstatus ok';
        const name = info ? `${info.py} (${info.en})` : `stroke ${qDone}`;
        s.textContent = `✅ ${name} — correct! ${qDone < qTotal ? `Next: stroke ${qDone + 1}/${qTotal}` : 'Last one!'}`;
      }
      // Announce next stroke name
      if (qDone < qTotal) {
        setTimeout(() => announceStroke(qDone), 200);
      }
    },
    onComplete: () => {
      playCompleteSound();
      const c = curCh.chars[curIdx], d = CD[c];
      const s = document.getElementById('sstatus');
      if (s) { s.className = 'sstatus done'; s.textContent = `🎉 All ${qTotal} strokes correct! "${c}" written perfectly!`; }
      const nd = document.getElementById('strokeNameDisplay');
      if (nd) nd.innerHTML = `<span style="color:var(--green);font-weight:800;font-size:1rem">⭐ All strokes done!</span>`;
      if (!S[c]?.w) {
        if (!S[c]) S[c] = {};
        S[c].w = true; stars++;
        save(); renderChs();
        showCel('✏️ Write Test Passed!', `You wrote ${c} (${d.py}) correctly! Now try the Speak Test! 🎤`, '🎊');
        setTimeout(() => { renderNav(); renderChar(); }, 2600);
      }
    }
  });
}

function doAnim() {
  if (!watchW) return;
  
  // Hide the character first so we see the animation from scratch
  watchW.hideCharacter();
  watchW.hideOutline();
  
  // Small delay ensures the writer is ready and prevents race conditions
  setTimeout(() => {
    // Announce the first stroke immediately (index 0)
    announceStroke(0);
    
    // Start the animation
    watchW.animateCharacter({
      onComplete: function() {
        // Optional: Show outline again when done
        watchW.showOutline();
      }
    });
    
    // Schedule remaining strokes based on timing
    if (currentCharData && currentCharData.strokes) {
      const total = currentCharData.strokes.length;
      if (total > 1) {
        // Hanzi Writer default animation is roughly 1-1.5s per stroke including delays.
        // We use a safe interval (1.1s) to trigger the announcement before the stroke draws.
        const delayPerStroke = 1100; 
        
        for (let i = 1; i < total; i++) {
          ((idx) => {
            setTimeout(() => {
              announceStroke(idx);
            }, idx * delayPerStroke);
          })(i);
        }
      }
    }
  }, 50); // 50ms delay to ensure writer state is settled
}

function doLoop() {
  if (watchW) watchW.loopCharacterAnimation();
}
function doHint() { if (quizW) quizW.showHint(); }
function resetQ() {
  if (!quizW) return;
  qDone = 0; updQProg();
  quizW.cancelQuiz();
  const s = document.getElementById('sstatus');
  if (s) { s.className = 'sstatus hint'; s.textContent = '✏️ Draw the 1st stroke — follow the correct direction!'; }
  const nd = document.getElementById('strokeNameDisplay');
  if (nd) nd.innerHTML = '';
  setTimeout(() => {
    beginQuiz(curCh.chars[curIdx]);
    setTimeout(() => announceStroke(0), 300);
  }, 120);
}
function updQProg() {
  const p = document.getElementById('qprog');
  if (p && qTotal > 0) p.textContent = `Strokes: ${qDone} / ${qTotal}`;
}

// ── SPEECH OUTPUT ─────────────────────────────────────
function spk(text, slow = false) {
  const a = new Audio();
  a.src = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=zh-CN&client=gtx&q=${encodeURIComponent(text)}`;
  a.playbackRate = slow ? 0.6 : 1;
  a.play().catch(() => {
    if (!window.speechSynthesis) { showToast('⚠️ No audio. Try Chrome!'); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = slow ? 0.4 : 0.85;
    const v = window.speechSynthesis.getVoices().find(x => x.lang.startsWith('zh'));
    if (v) u.voice = v;
    u.onerror = () => showToast('⚠️ No Chinese voice — install Chinese language pack.');
    window.speechSynthesis.speak(u);
  });
}

// ── PRONUNCIATION TEST — multi-attempt, very lenient ─
// Strategy: 3 attempts allowed. On attempt 1 use strict zh-CN.
// On attempt 2 also try en-US (kids sometimes say pinyin in English accent).
// On attempt 3, auto-pass with encouragement.
// Matching: very generous — any overlapping sound counts.

let recAttempts = 0;
let recChar = '', recPy = '', recEn = '';
let recTimer = null;

function initRecTest(char, py, en) {
  recAttempts = 0;
  recChar = char; recPy = py; recEn = en;
  updateRecUI();
}

function updateRecUI() {
  const btn = document.getElementById('recBtn');
  const res = document.getElementById('rresult');
  const attEl = document.getElementById('recAttempts');
  if (!btn) return;

  if (recAttempts === 0) {
    btn.innerHTML = '🎤 Tap &amp; Say It!';
    btn.classList.remove('rec');
    if (res) { res.className = 'rresult'; res.style.display = 'none'; }
  }
  if (attEl) {
    const left = 3 - recAttempts;
    attEl.innerHTML = left > 0
      ? `Attempts left: ${'🟢'.repeat(left)}${'⚫'.repeat(3-left)}`
      : '';
  }
}

function toggleRec(char, py, en) {
  if (isRec) { stopRec(); return; }
  // Re-init if different character
  if (char !== recChar) initRecTest(char, py, en);
  startRec();
}

function startRec() {
  if (isRec) return;
  const btn = document.getElementById('recBtn');
  const res = document.getElementById('rresult');

  // Try WebSpeech first (no mic needed, uses browser's ASR)
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SR) {
    startWebSpeechRec(SR, btn, res);
  } else {
    // Fallback: just show pinyin quiz buttons (manual check)
    showManualFallback(btn, res);
  }
}

function startWebSpeechRec(SR, btn, res) {
  speechR = new SR();
  // Try zh-CN first, unless attempt 2+ then also try en-US
  speechR.lang = 'zh-CN';
  speechR.continuous = false;
  speechR.interimResults = true;
  speechR.maxAlternatives = 10;

  isRec = true;
  if (btn) {
    btn.innerHTML = '🔴 Listening... tap to stop';
    btn.classList.add('rec');
  }
  if (res) {
    res.className = 'rresult wait';
    res.style.display = 'block';
    res.innerHTML = startCountdownHTML();
  }

  // Auto-stop after 5s
  clearTimeout(recTimer);
  recTimer = setTimeout(() => { if (isRec) speechR.stop(); }, 5000);

  let finalResult = null;
  let interimResult = null;

  speechR.onresult = (e) => {
    const results = Array.from(e.results);
    // Collect all alternatives across all result groups
    const allTexts = [];
    results.forEach(r => {
      for (let i = 0; i < r.length; i++) allTexts.push(r[i].transcript.trim());
    });
    // Show interim
    if (allTexts.length && res) {
      interimResult = allTexts[0];
      res.innerHTML = `<span style="color:#888;font-size:.85rem">🎧 Hearing: <em>"${interimResult}"</em>…</span>`;
    }
    // Check final
    const finalGroup = results.find(r => r.isFinal);
    if (finalGroup) {
      finalResult = Array.from(finalGroup).map(a => a.transcript.trim());
    }
  };

  speechR.onerror = (e) => {
    clearTimeout(recTimer);
    isRec = false;
    if (btn) { btn.innerHTML = '🎤 Tap &amp; Say It!'; btn.classList.remove('rec'); }
    if (e.error === 'not-allowed') {
      if (res) { res.className = 'rresult fail'; res.style.display = 'block';
        res.innerHTML = `🎙️ Microphone blocked!<br><small>Allow mic in your browser settings, then try again.</small>`; }
      return;
    }
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (interimResult) {
        // We had some interim — process it as result
        processRecResult([interimResult], btn, res);
      } else {
        recAttempts++;
        if (recAttempts >= 3) { autoPass(btn, res); return; }
        if (res) { res.className = 'rresult fail'; res.style.display = 'block';
          res.innerHTML = `😅 I couldn't hear anything. Speak louder and clearly!<br>
            <small style="color:#aaa">Attempt ${recAttempts}/3 — ${3-recAttempts} left</small>`; }
        if (btn) { btn.innerHTML = '🎤 Try Again!'; btn.classList.remove('rec'); }
      }
    }
  };

  speechR.onend = () => {
    clearTimeout(recTimer);
    isRec = false;
    if (btn) { btn.innerHTML = '🎤 Tap &amp; Say It!'; btn.classList.remove('rec'); }
    if (finalResult && finalResult.length) {
      processRecResult(finalResult, btn, res);
    } else if (interimResult) {
      processRecResult([interimResult], btn, res);
    }
    // else onerror already handled
  };

  try {
    speechR.start();
  } catch(e) {
    isRec = false;
    showManualFallback(btn, res);
  }
}

function startCountdownHTML() {
  return `<span style="color:#555;font-size:.88rem">🎧 Listening… speak now!</span>
    <div style="margin-top:6px;background:#eee;border-radius:6px;height:5px;overflow:hidden">
      <div style="height:100%;background:var(--red);border-radius:6px;
        animation:countdown 5s linear forwards" id="recCountdown"></div>
    </div>`;
}

function processRecResult(heardList, btn, res) {
  recAttempts++;
  const pass = isGoodEnough(heardList, recChar, recPy, recEn);

  if (pass) {
    if (res) {
      res.className = 'rresult pass'; res.style.display = 'block';
      res.innerHTML = `🎉 <strong>Great!</strong> I heard: "<em>${heardList[0]}</em>"<br>
        <span style="font-size:.82rem">✅ That sounds like ${recChar} = ${recPy}</span>`;
    }
    passSpeak();
  } else {
    if (recAttempts >= 3) {
      autoPass(btn, res);
      return;
    }
    if (res) {
      res.className = 'rresult fail'; res.style.display = 'block';
      res.innerHTML = `😅 I heard: "<em>${heardList[0]}</em>"<br>
        <span style="font-size:.82rem">Try saying <strong style="color:var(--primary)">${recPy}</strong> — listen first, then repeat!</span><br>
        <small style="color:#aaa">Attempt ${recAttempts}/3 — ${3-recAttempts} left</small>`;
    }
    if (btn) { btn.innerHTML = '🎤 Try Again!'; btn.classList.remove('rec'); }
  }
}

function isGoodEnough(heardList, char, py, en) {
  const normPy = normTone(py);
  // Extract just consonant+vowel initials for very loose matching
  const pyInitial = normPy.slice(0, 2);
  const pyVowels = normPy.replace(/[^aeiouüāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/gi, '');

  return heardList.some(h => {
    if (!h) return false;
    const hl = h.toLowerCase().trim();
    const hn = normTone(h);

    // 1. Direct character match
    if (hl.includes(char)) return true;

    // 2. Exact pinyin match (no tones)
    if (hn.includes(normPy)) return true;
    if (normPy.includes(hn) && hn.length >= 2) return true;

    // 3. Partial pinyin — at least first 2 chars of pinyin
    if (hn.includes(pyInitial) && pyInitial.length >= 2) return true;

    // 4. Vowel sound match — heard vowels overlap with pinyin vowels
    const heardVowels = hn.replace(/[^aeiou]/gi, '');
    if (pyVowels.length >= 2 && heardVowels.length >= 1 &&
        (pyVowels.includes(heardVowels) || heardVowels.includes(pyVowels.slice(0,2)))) return true;

    // 5. English meaning
    if (en.toLowerCase().split('/').some(m => hl.includes(m.trim().toLowerCase()))) return true;

    // 6. Sounds-like matching — compare first phoneme
    const pyMap = {
      'x':'sh','q':'ch','zh':'j','z':'ds','c':'ts','r':'r',
      'b':'b','p':'p','m':'m','f':'f','d':'d','t':'t','n':'n','l':'l',
      'g':'g','k':'k','h':'h','j':'j','y':'y','w':'w'
    };
    for (const [cn, en2] of Object.entries(pyMap)) {
      if (normPy.startsWith(cn) && hn.startsWith(en2)) return true;
    }

    return false;
  });
}

function autoPass(btn, res) {
  // After 3 attempts, be encouraging and give partial credit
  if (res) {
    res.className = 'rresult pass'; res.style.display = 'block';
    res.innerHTML = `⭐ <strong>Good effort!</strong><br>
      Keep practicing: <strong style="color:var(--primary)">${recPy}</strong><br>
      <span style="font-size:.82rem;color:#065F46">You tried 3 times — that counts! 💪</span>`;
  }
  passSpeak();
}

function showManualFallback(btn, res) {
  // No speech recognition available — show pinyin choice buttons
  if (!res) return;
  const allPy = [...new Set(Object.values(CD).map(x => x.py))].filter(p => p !== recPy).sort(() => Math.random()-.5).slice(0,3);
  const opts = [recPy, ...allPy].sort(() => Math.random()-.5);
  res.className = 'rresult wait'; res.style.display = 'block';
  res.innerHTML = `<div style="font-size:.85rem;font-weight:700;color:#555;margin-bottom:8px">
      🎙️ Mic not available — pick the correct pinyin for <strong style="font-family:'Noto Sans SC'">${recChar}</strong>:
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${opts.map(p => `<button onclick="checkManualPy('${p}','${recPy}',this)"
        style="background:#f5f5f5;border:2px solid #ddd;border-radius:10px;padding:10px;
        font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;cursor:pointer">${p}</button>`).join('')}
    </div>`;
  if (btn) btn.style.display = 'none';
}

function checkManualPy(chosen, correct, el) {
  document.querySelectorAll('[onclick^="checkManualPy"]').forEach(b => b.disabled = true);
  const res = document.getElementById('rresult');
  const btn = document.getElementById('recBtn');
  if (chosen === correct) {
    el.style.background = '#ECFDF5'; el.style.borderColor = '#06D6A0';
    if (res) { res.className = 'rresult pass';
      res.innerHTML += `<div style="margin-top:8px;font-weight:700;color:#065F46">✅ Correct! ${recChar} = ${correct}</div>`; }
    if (btn) btn.style.display = '';
    passSpeak();
  } else {
    el.style.background = '#FFF5F5'; el.style.borderColor = '#EF233C';
    document.querySelectorAll('[onclick^="checkManualPy"]').forEach(b => {
      if (b.textContent === correct) { b.style.background = '#ECFDF5'; b.style.borderColor = '#06D6A0'; }
    });
    if (res) res.innerHTML += `<div style="margin-top:8px;font-size:.85rem;color:#991B1B">The answer is ${correct} — try the mic next time!</div>`;
    if (btn) { btn.style.display = ''; btn.innerHTML = '🎤 Try Again!'; }
    // Give it to them anyway after seeing the answer
    setTimeout(() => passSpeak(), 2000);
  }
}

function stopRec() { if (speechR) { try { speechR.stop(); } catch(e){} } clearTimeout(recTimer); isRec = false; }

function normTone(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/\s/g, ''); }

function passSpeak() {
  const c = curCh?.chars[curIdx]; if (!c) return;
  const d = CD[c]; if (!d) return;
  if (!S[c]?.sp) {
    if (!S[c]) S[c] = {};
    S[c].sp = true;
    const nowMastered = S[c].w && S[c].sp;
    stars += nowMastered ? 2 : 1;
    save(); renderChs();
    if (nowMastered) {
      setTimeout(() => {
        showCel(`⭐ MASTERED ${c}!`, `You can write AND say ${c} (${d.py})! +2 Stars!`, '🌟');
        renderNav(); renderChar();
      }, 1800);
    } else {
      setTimeout(() => { renderNav(); renderChar(); }, 2000);
    }
  }
}

// ── GAMES ─────────────────────────────────────────────
function renderGames() {
  document.getElementById('pane-games').innerHTML = `
    <div style="font-size:1rem;font-weight:800;color:#555;margin-bottom:10px">🎮 Pick a Game!</div>
    <div class="games-grid">
      <div class="gcard" style="border-color:#FF6B35" onclick="startGame('match')">
        <div class="gicon">🎯</div><div class="gname">Match It!</div>
        <div class="gdesc">Match character to meaning</div>
      </div>
      <div class="gcard" style="border-color:#FFD166" onclick="startGame('find')">
        <div class="gicon">🔍</div><div class="gname">Find It!</div>
        <div class="gdesc">Find the right character</div>
      </div>
      <div class="gcard" style="border-color:#06D6A0" onclick="startGame('pinyin')">
        <div class="gicon">🎵</div><div class="gname">Pinyin Pick!</div>
        <div class="gdesc">Choose the right sound</div>
      </div>
      <div class="gcard" style="border-color:#845EC2" onclick="startGame('flash')">
        <div class="gicon">⚡</div><div class="gname">Flash Cards</div>
        <div class="gdesc">Quick memory challenge!</div>
      </div>
      <div class="gcard" style="border-color:#118AB2" onclick="startGame('sentence')">
        <div class="gicon">💬</div><div class="gname">Sentence Match</div>
        <div class="gdesc">Match sentence to meaning</div>
      </div>
      <div class="gcard" style="border-color:#E91E8C" onclick="startGame('tone')">
        <div class="gicon">🎶</div><div class="gname">Tone Quiz</div>
        <div class="gdesc">Pick the right tone!</div>
      </div>
    </div>
    <p style="text-align:center;color:#bbb;font-size:.82rem;margin-top:6px">All characters and sentences available! 🎮</p>`;
}

function startGame(type) { GS = { type, score: 0, streak: 0 }; document.getElementById('gameModal').classList.add('open'); renderGame(type); }
function closeGame() { document.getElementById('gameModal').classList.remove('open'); }

function renderGame(type) {
  const gc = document.getElementById('gameContent');
  const chars = Object.keys(CD);
  const char = chars[Math.floor(Math.random() * chars.length)];
  const d = CD[char]; GS.cur = char;
  const sc = `<div class="gscore">Score: ${GS.score} &nbsp; Streak: ${GS.streak}🔥</div>`;

  if (type === 'match') {
    const wrong = chars.filter(c => c !== char).sort(() => Math.random() - .5).slice(0, 3);
    const opts = [char, ...wrong].sort(() => Math.random() - .5);
    gc.innerHTML = `<div class="gtitle">🎯 Match It!</div>${sc}
      <div style="font-size:.85rem;color:#888;margin-bottom:7px">What does this mean?</div>
      <div class="gchar" onclick="spk('${char}')">${char} <span style="font-size:.9rem">🔊</span></div>
      <div style="text-align:center;font-size:.72rem;color:#bbb;margin-bottom:9px">Tap to hear</div>
      <div class="gopts">${opts.map(c => `<button class="gopt" onclick="chkM(this,'${c}','${char}')">
        ${CD[c].emoji} ${CD[c].en}<br><small style="color:#aaa">${CD[c].py}</small>
      </button>`).join('')}</div><div id="gr"></div>`;
  }
  else if (type === 'find') {
    const wrong = chars.filter(c => c !== char).sort(() => Math.random() - .5).slice(0, 7);
    const opts = [char, ...wrong].sort(() => Math.random() - .5);
    gc.innerHTML = `<div class="gtitle">🔍 Find It!</div>${sc}
      <div style="background:#FFF8E8;border-radius:12px;padding:11px;border:2px dashed var(--secondary);text-align:center;margin-bottom:12px;font-weight:700;color:#555">
        Find: <strong style="color:var(--primary);font-size:1.1rem">${d.emoji} ${d.en}</strong><br>
        <span style="font-size:.82rem;color:#888">Pinyin: ${d.py}</span>
      </div>
      <div class="fgrid">${opts.map(c => `<div class="fopt" onclick="chkF(this,'${c}','${char}')">${c}</div>`).join('')}</div>
      <div id="gr"></div>`;
  }
  else if (type === 'pinyin') {
    const allP = [...new Set(Object.values(CD).map(x => x.py))].filter(p => p !== d.py).sort(() => Math.random() - .5).slice(0, 3);
    const opts = [d.py, ...allP].sort(() => Math.random() - .5);
    gc.innerHTML = `<div class="gtitle">🎵 Pinyin Pick!</div>${sc}
      <div style="font-size:.85rem;color:#888;margin-bottom:7px">How do you say this?</div>
      <div class="gchar" onclick="spk('${char}')">${char} <span style="font-size:.9rem">🔊</span></div>
      <div style="text-align:center;font-size:.72rem;color:#bbb;margin-bottom:9px">Tap to hear</div>
      <div class="gopts">${opts.map(p => `<button class="gopt" style="font-size:1.1rem;font-weight:800" onclick="chkP(this,'${p}','${d.py}','${char}')">${p}</button>`).join('')}</div>
      <div id="gr"></div>`;
  }
  else if (type === 'flash') {
    gc.innerHTML = `<div class="gtitle">⚡ Flash Cards!</div>${sc}
      <div style="font-size:.85rem;color:#888;margin-bottom:7px">What does this mean?</div>
      <div class="gchar" onclick="spk('${char}')">${char}</div>
      <div style="text-align:center;font-size:.72rem;color:#bbb;margin-bottom:12px">Tap to hear pronunciation</div>
      <button onclick="revealF('${char}')" class="nbtn" style="background:var(--purple);box-shadow:0 4px 0 #5E3D96">🔮 Reveal Answer!</button>
      <div id="gr"></div>`;
  }
  else if (type === 'sentence') {
    const allSents = CHAPTERS.filter(c => c.isSentence).flatMap(c => c.sentences);
    const sent = allSents[Math.floor(Math.random() * allSents.length)];
    GS.sentAns = sent.en;
    const wrongSents = allSents.filter(s => s.en !== sent.en).sort(() => Math.random() - .5).slice(0, 3);
    const opts = [sent, ...wrongSents].sort(() => Math.random() - .5);
    gc.innerHTML = `<div class="gtitle">💬 Sentence Match!</div>${sc}
      <div style="font-size:.85rem;color:#888;margin-bottom:7px">What does this mean?</div>
      <div style="font-family:'Noto Sans SC',sans-serif;font-size:1.8rem;font-weight:900;text-align:center;
        color:#1A1A2E;margin-bottom:4px;cursor:pointer;line-height:1.3" onclick="spk('${sent.zh}')">${sent.zh} 🔊</div>
      <div style="text-align:center;font-size:.82rem;color:var(--primary);font-weight:700;margin-bottom:12px">${sent.py}</div>
      <div class="gopts">${opts.map(s => `<button class="gopt" onclick="chkSent(this,'${encodeURIComponent(s.en)}','${encodeURIComponent(sent.en)}')">${s.en}</button>`).join('')}</div>
      <div id="gr"></div>`;
  }
  else if (type === 'tone') {
    const tones = [0,1,2,3,4];
    const opts4 = tones.filter(t => t !== d.t).sort(() => Math.random()-.5).slice(0,3);
    const allOpts = [d.t, ...opts4].sort(() => Math.random()-.5);
    const toneNames = ['Neutral', '1st (ā)', '2nd (á)', '3rd (ǎ)', '4th (à)'];
    gc.innerHTML = `<div class="gtitle">🎶 Tone Quiz!</div>${sc}
      <div style="font-size:.85rem;color:#888;margin-bottom:7px">What tone is this character?</div>
      <div class="gchar" onclick="spk('${char}')">${char} <span style="font-size:.9rem">🔊</span></div>
      <div style="text-align:center;font-size:1rem;color:var(--primary);font-weight:700;margin-bottom:10px">${d.py}</div>
      <div class="gopts">${allOpts.map(t => `<button class="gopt" onclick="chkTone(this,${t},${d.t},'${char}')">${toneNames[t]}</button>`).join('')}</div>
      <div id="gr"></div>`;
  }
}

function chkM(btn, chosen, correct) {
  document.querySelectorAll('.gopt').forEach(b => b.disabled = true);
  if (chosen === correct) { btn.classList.add('ok'); GS.score++; GS.streak++; gRes(true, correct); }
  else { btn.classList.add('bad'); GS.streak = 0; document.querySelectorAll('.gopt').forEach(b => { if (b.textContent.includes(CD[correct].en)) b.classList.add('ok'); }); gRes(false, correct); }
}
function chkF(el, chosen, correct) {
  document.querySelectorAll('.fopt').forEach(b => b.style.pointerEvents = 'none');
  if (chosen === correct) { el.classList.add('ok'); GS.score++; GS.streak++; gRes(true, correct); }
  else { el.classList.add('bad'); GS.streak = 0; document.querySelectorAll('.fopt').forEach(b => { if (b.textContent === correct) b.classList.add('ok'); }); gRes(false, correct); }
}
function chkP(btn, chosen, correct, char) {
  document.querySelectorAll('.gopt').forEach(b => b.disabled = true);
  if (chosen === correct) { btn.classList.add('ok'); GS.score++; GS.streak++; gRes(true, char); }
  else { btn.classList.add('bad'); GS.streak = 0; document.querySelectorAll('.gopt').forEach(b => { if (b.textContent.trim() === correct) b.classList.add('ok'); }); gRes(false, char); }
}
function chkSent(btn, chosenEnc, correctEnc) {
  const chosen = decodeURIComponent(chosenEnc), correct = decodeURIComponent(correctEnc);
  document.querySelectorAll('.gopt').forEach(b => b.disabled = true);
  if (chosen === correct) { btn.classList.add('ok'); GS.score++; GS.streak++; }
  else { btn.classList.add('bad'); GS.streak = 0; document.querySelectorAll('.gopt').forEach(b => { if (b.textContent.trim() === correct) b.classList.add('ok'); }); }
  const gr = document.getElementById('gr');
  if (gr) {
    gr.innerHTML = `<div class="gres ${chosen===correct?'pass':'fail'}"><span class="be">${chosen===correct?'🎉':'😅'}</span>
      ${chosen===correct?'Correct!':'Not quite!'} Score: ${GS.score} | Streak: ${GS.streak}🔥
    </div><button class="nbtn" onclick="renderGame('sentence')">Next ➜</button>`;
  }
}
function chkTone(btn, chosen, correct, char) {
  document.querySelectorAll('.gopt').forEach(b => b.disabled = true);
  const toneNames = ['Neutral', '1st (ā)', '2nd (á)', '3rd (ǎ)', '4th (à)'];
  if (chosen === correct) { btn.classList.add('ok'); GS.score++; GS.streak++; gRes(true, char); }
  else { btn.classList.add('bad'); GS.streak = 0; document.querySelectorAll('.gopt').forEach(b => { if (b.textContent === toneNames[correct]) b.classList.add('ok'); }); gRes(false, char); }
}
function revealF(char) {
  const d = CD[char];
  document.getElementById('gr').innerHTML = `
    <div style="background:#FFF8E8;border-radius:12px;padding:12px;margin:10px 0;border:2px solid var(--secondary);text-align:center">
      <div style="font-size:1.8rem">${d.emoji}</div>
      <div style="font-size:1.1rem;font-weight:800">${d.enFull}</div>
      <div style="color:var(--primary);font-weight:700">${d.py}</div>
    </div>
    <div style="font-weight:700;color:#555;text-align:center;margin-bottom:8px">Did you know it?</div>
    <div style="display:flex;gap:7px">
      <button onclick="flashA(true)" style="flex:1;background:var(--green);color:white;border:none;border-radius:11px;padding:11px;font-family:'Baloo 2';font-size:.9rem;font-weight:800;cursor:pointer;box-shadow:0 3px 0 #04A07A">✅ Yes!</button>
      <button onclick="flashA(false)" style="flex:1;background:var(--red);color:white;border:none;border-radius:11px;padding:11px;font-family:'Baloo 2';font-size:.9rem;font-weight:800;cursor:pointer;box-shadow:0 3px 0 #A0001C">❌ No</button>
    </div>`;
}
function flashA(ok) { if (ok) { GS.score++; GS.streak++; } else GS.streak = 0; gRes(ok, GS.cur); }

function gRes(pass, char) {
  const d = CD[char], el = document.getElementById('gr');
  if (!el) return;
  if (pass) {
    el.innerHTML = `<div class="gres pass"><span class="be">${['🎉','⭐','🌟','🥳','✨'][Math.floor(Math.random()*5)]}</span>
      Correct! ${char} = ${d.en} (${d.py})<br><small>Score: ${GS.score} | Streak: ${GS.streak}🔥</small>
    </div><button class="nbtn" onclick="renderGame('${GS.type}')">Next ➜</button>`;
    if (GS.streak > 0 && GS.streak % 5 === 0) spawnC();
  } else {
    el.innerHTML = `<div class="gres fail"><span class="be">😅</span>
      ${char} = ${d.enFull} (${d.py}) — practice more!
    </div><button class="nbtn" onclick="renderGame('${GS.type}')">Try Again ➜</button>`;
  }
}

// ── PROGRESS ─────────────────────────────────────────
function renderProg() {
  const all = Object.keys(CD), mastered = all.filter(c => getStatus(c) === 'mastered').length;
  const pct = Math.round(mastered / all.length * 100);
  const sentTotal = CHAPTERS.filter(c => c.isSentence).reduce((a, c) => a + c.sentences.length, 0);
  const sentDone = CHAPTERS.filter(c => c.isSentence).reduce((a, c) => a + (S['sent_' + c.id] || []).length, 0);

  document.getElementById('pane-progress').innerHTML = `
    <div class="psec">
      <div class="pstitle">🏆 Your Progress</div>
      <div style="font-size:.95rem;color:#555;margin-bottom:6px">Characters mastered: <strong style="color:var(--primary)">${mastered}</strong> / ${all.length}</div>
      <div class="prog-bar" style="height:13px;border-radius:10px;margin-bottom:4px">
        <div class="prog-fill" style="width:${pct}%;height:13px"></div>
      </div>
      <div style="font-size:.8rem;color:#aaa;margin-bottom:10px">${pct}% complete</div>
      <div style="font-size:.95rem;color:#555;margin-bottom:6px">Sentences learned: <strong style="color:var(--blue)">${sentDone}</strong> / ${sentTotal}</div>
      <div style="font-size:.82rem;color:#666">⭐ ${stars} stars &nbsp;|&nbsp; ✏️ ${all.filter(c=>S[c]?.w).length} write &nbsp;|&nbsp; 🎤 ${all.filter(c=>S[c]?.sp).length} speak</div>
      <div style="font-size:.75rem;margin-top:8px;color:#ccc">
        <span style="color:#845EC2">■</span> Write ✓ &nbsp;
        <span style="color:#D4A000">■</span> Speak ✓ &nbsp;
        <span style="color:var(--green)">■</span> Mastered ⭐
      </div>
    </div>
    ${CHAPTERS.filter(c => !c.isSentence).map(ch => {
      const done = ch.chars.filter(c => getStatus(c) === 'mastered').length;
      return `<div class="psec">
        <div class="pstitle">${ch.emoji} ${ch.title}</div>
        <div class="cdots">${ch.chars.map(c => {
          const sv = S[c] || {};
          const cl = sv.w && sv.sp ? 'both' : sv.w ? 'wonly' : sv.sp ? 'sonly' : '';
          const ic = sv.w && sv.sp ? '⭐' : sv.w ? '✏️' : sv.sp ? '🎤' : '';
          return `<div class="cdot ${cl}" title="${CD[c]?.en} (${CD[c]?.py})">${c}<small>${ic}</small></div>`;
        }).join('')}</div>
        <div class="prog-bar" style="margin-top:9px;height:8px;border-radius:8px">
          <div class="prog-fill" style="width:${Math.round(done/ch.chars.length*100)}%"></div>
        </div>
        <div style="font-size:.78rem;color:#aaa;margin-top:4px">${done}/${ch.chars.length} mastered</div>
      </div>`;
    }).join('')}
    ${CHAPTERS.filter(c => c.isSentence).map(ch => {
      const done2 = (S['sent_' + ch.id] || []).length;
      return `<div class="psec">
        <div class="pstitle">${ch.emoji} ${ch.title} <span style="font-size:.72rem;color:var(--blue);background:#E8F4FF;border-radius:6px;padding:1px 6px;margin-left:4px">sentences</span></div>
        <div class="prog-bar" style="margin:6px 0;height:8px;border-radius:8px">
          <div class="prog-fill" style="width:${Math.round(done2/ch.sentences.length*100)}%;background:linear-gradient(90deg,var(--blue),#38BDF8)"></div>
        </div>
        <div style="font-size:.78rem;color:#aaa">${done2}/${ch.sentences.length} learned</div>
      </div>`;
    }).join('')}
    <div style="text-align:center;padding:14px">
      <button onclick="if(confirm('Reset ALL progress?')){S={};stars=0;save();renderChs();renderProg();}"
        style="background:white;border:2px solid #ddd;border-radius:11px;padding:8px 16px;font-family:'Baloo 2';font-size:.82rem;cursor:pointer;color:#ccc">
        🔄 Reset Progress
      </button>
    </div>`;
}

// ── CELEBRATION ───────────────────────────────────────
function showCel(title, sub, emoji = '🎉') {
  document.getElementById('celT').textContent = title;
  document.getElementById('celS').textContent = sub;
  document.getElementById('celE').textContent = emoji;
  document.getElementById('cel').classList.add('show');
  spawnC();
}
function closeCel() {
  document.getElementById('cel').classList.remove('show');
  document.querySelectorAll('.cp').forEach(c => c.remove());
}
function spawnC() {
  const cols = ['#FF6B35','#FFD166','#06D6A0','#118AB2','#845EC2','#FF9EBB','#EF233C'];
  for (let i = 0; i < 60; i++) setTimeout(() => {
    const p = document.createElement('div');
    p.className = 'cp';
    const dur = 1.4 + Math.random() * 0.9;
    p.style.cssText = `left:${Math.random()*100}vw;top:-10px;width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${dur}s;animation-delay:${Math.random()*.5}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), (dur + 0.6) * 1000);
  }, i * 28);
}

function showToast(msg, dur = 3500) {
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', dur);
}

// ── START ─────────────────────────────────────────────
init();
