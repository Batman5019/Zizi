<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐼 Zizi</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#FF6B35; --secondary:#FFD166; --green:#06D6A0; --blue:#118AB2;
  --purple:#845EC2; --red:#EF233C; --bg:#FFF7ED;
  --shadow:0 5px 0 rgba(0,0,0,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Baloo 2',cursive;background:var(--bg);min-height:100vh;overflow-x:hidden}

.cloud{position:fixed;background:white;border-radius:50px;opacity:.5;pointer-events:none;z-index:0}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%}
.c1{width:120px;height:38px;top:7%;left:-10px;animation:cmove 22s linear infinite}
.c1::before{width:58px;height:58px;top:-28px;left:14px}
.c1::after{width:38px;height:38px;top:-16px;left:54px}
.c2{width:150px;height:46px;top:22%;left:72%;animation:cmove 30s linear infinite 6s}
.c2::before{width:76px;height:76px;top:-38px;left:18px}
.c2::after{width:50px;height:50px;top:-22px;left:76px}
@keyframes cmove{from{transform:translateX(120vw)}to{transform:translateX(-320px)}}

header{position:relative;z-index:10;text-align:center;padding:18px 20px 14px;
  background:linear-gradient(180deg,#FFD166,#FFBA08);border-bottom:5px solid #E8A000;
  box-shadow:0 4px 0 rgba(0,0,0,.1)}
header h1{font-size:clamp(1.6rem,5vw,2.6rem);color:#7B2D00;text-shadow:2px 2px 0 rgba(255,255,255,.4)}
.hdr-stats{display:flex;justify-content:center;gap:16px;margin-top:6px;font-size:.9rem;font-weight:700;color:#8B4000;flex-wrap:wrap}

.tabs{display:flex;justify-content:center;gap:6px;padding:14px 12px 0;position:relative;z-index:10;flex-wrap:wrap}
.tab{background:white;border:3px solid #ddd;border-radius:18px 18px 0 0;padding:9px 18px;
  font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;color:#888}
.tab.active{border-color:var(--primary);border-bottom-color:white;color:var(--primary);transform:translateY(3px)}
.tab:hover:not(.active){background:#FFF0E8}

.content{position:relative;z-index:5;max-width:860px;margin:0 auto;padding:20px 16px 70px}
.pane{display:none}.pane.active{display:block}

.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.ch-card{background:white;border-radius:18px;padding:18px 14px;text-align:center;cursor:pointer;
  border:3px solid transparent;box-shadow:var(--shadow);transition:all .2s;position:relative}
.ch-card:hover{transform:translateY(-4px)}
.ch-label{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.ch-chars{font-family:'Noto Sans SC',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:2px;line-height:1.7;color:#333;margin-bottom:6px}
.ch-prog{display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:9px;background:#eee;border-radius:9px;overflow:hidden}
.prog-fill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--green),#34D399);transition:width .4s}
.ch0{border-color:#FF6B35;background:linear-gradient(135deg,#FFF5F0,white)}.ch0 .ch-label{color:#FF6B35}
.ch1{border-color:#D4A000;background:linear-gradient(135deg,#FFFBF0,white)}.ch1 .ch-label{color:#D4A000}
.ch2{border-color:#06D6A0;background:linear-gradient(135deg,#F0FFF9,white)}.ch2 .ch-label{color:#06D6A0}
.ch3{border-color:#118AB2;background:linear-gradient(135deg,#F0F9FF,white)}.ch3 .ch-label{color:#118AB2}
.ch4{border-color:#845EC2;background:linear-gradient(135deg,#F8F0FF,white)}.ch4 .ch-label{color:#845EC2}

.learn-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{background:white;border:3px solid #ddd;border-radius:50%;width:42px;height:42px;font-size:1.1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--primary);transform:scale(1.08)}

.char-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.cnav{font-family:'Noto Sans SC',sans-serif;font-size:1.25rem;font-weight:700;
  width:50px;height:50px;border-radius:13px;border:3px solid #ddd;background:white;
  cursor:pointer;transition:all .2s;box-shadow:0 3px 0 #ddd;display:flex;align-items:center;justify-content:center;position:relative}
.cnav:hover{transform:translateY(-2px)}
.cnav.active{border-color:var(--primary);background:#FFF0E8;box-shadow:0 3px 0 var(--primary)}
.cnav.mastered::after{content:'⭐';position:absolute;top:-8px;right:-8px;font-size:12px}
.cnav.partial::after{content:'~';position:absolute;top:-6px;right:-6px;background:var(--secondary);
  color:#7B2D00;border-radius:50%;width:17px;height:17px;font-size:9px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-weight:700}

.card{background:white;border-radius:24px;padding:22px;box-shadow:var(--shadow);border:3px solid var(--secondary);margin-bottom:16px}
.card-title{font-size:1rem;font-weight:800;color:#555;margin-bottom:14px;display:flex;align-items:center;gap:8px}

.big-char-wrap{text-align:center;padding:8px 0 14px}
.big-char{font-family:'Noto Sans SC',sans-serif;font-size:clamp(4.5rem,16vw,6.5rem);font-weight:900;
  line-height:1;color:#1A1A2E;cursor:pointer;transition:transform .15s;display:inline-block}
.big-char:hover{transform:scale(1.06)}
.char-pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.pill{background:#FFF0E8;border:2px solid var(--secondary);border-radius:16px;padding:5px 14px;
  font-size:.95rem;font-weight:700;color:#8B4000}
.pill.py{font-size:1.2rem;color:var(--primary)}
.char-tip{text-align:center;margin-top:8px;color:#aaa;font-size:.85rem;font-style:italic}

.steps-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sbadge{display:flex;align-items:center;gap:6px;background:white;border:2px solid #ddd;
  border-radius:20px;padding:6px 14px;font-size:.85rem;font-weight:700;color:#aaa}
.sbadge.done{border-color:var(--green);background:#ECFDF5;color:#065F46}
.sbadge.now{border-color:var(--primary);background:#FFF0E8;color:var(--primary)}
.sbadge .sn{width:22px;height:22px;border-radius:50%;background:#ddd;display:flex;
  align-items:center;justify-content:center;font-size:.75rem;font-weight:800;flex-shrink:0}
.sbadge.done .sn{background:var(--green);color:white}
.sbadge.now .sn{background:var(--primary);color:white}

.writer-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.writer-box{border:3px solid #ddd;border-radius:18px;background:white;overflow:hidden}
.writer-box.quiz{border-color:var(--purple)}
.wrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.wbtn{background:white;border:3px solid #ddd;border-radius:12px;padding:9px 16px;
  font-family:'Baloo 2',cursive;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;
  box-shadow:0 3px 0 #ccc}
.wbtn:hover{transform:translateY(-1px)}
.wbtn.blue{background:var(--blue);color:white;border-color:var(--blue);box-shadow:0 3px 0 #0A6B8A}
.wbtn.red{background:var(--red);color:white;border-color:var(--red);box-shadow:0 3px 0 #A0001C}

.sstatus{text-align:center;font-size:.95rem;font-weight:700;padding:10px 14px;
  border-radius:12px;margin-top:8px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px}
.sstatus.hint{background:#FFF8E8;color:#8B4000;border:2px solid var(--secondary)}
.sstatus.ok{background:#ECFDF5;color:#065F46;border:2px solid var(--green)}
.sstatus.bad{background:#FFF5F5;color:#991B1B;border:2px solid var(--red)}
.sstatus.done{background:#F0F9FF;color:#0369A1;border:2px solid var(--blue)}
.qprog{font-size:.85rem;color:#888;text-align:center;margin-top:4px}

.hear-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.hbtn{background:var(--blue);color:white;border:none;border-radius:14px;padding:11px 20px;
  font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 #0A6B8A;transition:all .15s;display:flex;align-items:center;gap:6px}
.hbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #0A6B8A}
.hbtn.slow{background:#5E9E60;box-shadow:0 4px 0 #3D7B3F}

.pron-box{background:#FFF0F8;border-radius:18px;padding:18px;border:2px solid #FBCFE8;margin-top:12px}
.rbtn{width:100%;background:var(--red);color:white;border:none;border-radius:16px;padding:14px;
  font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 #A0001C;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.rbtn:active{transform:translateY(3px);box-shadow:0 2px 0 #A0001C}
.rbtn.rec{background:#444;box-shadow:0 5px 0 #111;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.rresult{margin-top:12px;padding:13px;border-radius:12px;font-size:.95rem;font-weight:700;text-align:center;line-height:1.5}
.rresult.pass{background:#ECFDF5;color:#065F46;border:2px solid var(--green)}
.rresult.fail{background:#FFF5F5;color:#991B1B;border:2px solid var(--red)}
.rresult.wait{background:#f5f5f5;color:#555;border:2px solid #ddd}

.lock-gate{background:#f5f5f5;border-radius:16px;padding:20px;text-align:center;border:3px dashed #ddd}
.master-badge{border-radius:18px;padding:14px;text-align:center;font-weight:800;font-size:1.05rem;
  margin-top:12px;box-shadow:0 4px 0;animation:shine 2s ease-in-out infinite}
@keyframes shine{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}

.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.gcard{background:white;border-radius:22px;padding:22px 18px;text-align:center;cursor:pointer;
  border:3px solid #ddd;box-shadow:var(--shadow);transition:all .2s}
.gcard:hover{transform:translateY(-4px)}
.gicon{font-size:2.6rem;margin-bottom:8px}
.gname{font-size:1.05rem;font-weight:800;color:#333;margin-bottom:3px}
.gdesc{font-size:.82rem;color:#999}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;
  align-items:center;justify-content:center;padding:14px}
.modal.open{display:flex}
.mbox{background:white;border-radius:26px;padding:26px;max-width:540px;width:100%;
  max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mclose{position:absolute;top:14px;right:14px;background:#f0f0f0;border:none;
  border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;font-weight:700;
  display:flex;align-items:center;justify-content:center}
.mclose:hover{background:#fdd}

.gtitle{font-size:1.4rem;font-weight:800;color:#333;margin-bottom:4px}
.gscore{font-size:.95rem;color:#888;margin-bottom:18px}
.gchar{font-family:'Noto Sans SC',sans-serif;font-size:4.5rem;font-weight:900;
  text-align:center;color:#1A1A2E;margin-bottom:6px;cursor:pointer}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.gopt{background:#F8F8F8;border:3px solid #ddd;border-radius:14px;padding:13px 8px;
  font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;color:#333;
  font-family:'Baloo 2',cursive}
.gopt:hover{border-color:var(--blue);background:#EFF9FF}
.gopt.ok{border-color:var(--green);background:#ECFDF5;color:#065F46;animation:popIn .3s ease}
.gopt.bad{border-color:var(--red);background:#FFF5F5;color:#991B1B;animation:shake .3s ease}
.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.fopt{font-family:'Noto Sans SC',sans-serif;font-size:2rem;font-weight:900;
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  background:#F8F8F8;border:3px solid #ddd;border-radius:13px;cursor:pointer;transition:all .2s}
.fopt:hover{border-color:var(--purple);background:#F8F0FF;transform:scale(1.05)}
.fopt.ok{border-color:var(--green);background:#ECFDF5;animation:popIn .3s ease}
.fopt.bad{border-color:var(--red);background:#FFF5F5;animation:shake .3s ease}
.gres{text-align:center;padding:16px;border-radius:16px;margin-top:12px;font-size:1rem;font-weight:700}
.gres.pass{background:#ECFDF5;color:#065F46;border:3px solid var(--green)}
.gres.fail{background:#FFF5F5;color:#991B1B;border:3px solid var(--red)}
.gres .be{font-size:2.6rem;display:block;margin-bottom:6px}
.nbtn{width:100%;background:var(--primary);color:white;border:none;border-radius:14px;
  padding:13px;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 4px 0 #C04A1E;transition:all .15s;margin-top:10px}
.nbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #C04A1E}

@keyframes popIn{0%{transform:scale(.9)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.psec{background:white;border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.pstitle{font-size:1rem;font-weight:800;color:#333;margin-bottom:10px}
.cdots{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cdot{font-family:'Noto Sans SC',sans-serif;font-size:.85rem;font-weight:700;
  width:40px;height:40px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#f0f0f0;color:#bbb;border:2px solid #ddd;gap:1px}
.cdot small{font-family:'Baloo 2',cursive;font-size:.5rem;line-height:1;color:#aaa}
.cdot.wonly{border-color:#845EC2;background:#F8F0FF;color:#845EC2}
.cdot.sonly{border-color:var(--secondary);background:#FFFBEB;color:#8B4000}
.cdot.both{border-color:var(--green);background:#ECFDF5;color:#065F46}

.cel{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);
  align-items:center;justify-content:center}
.cel.show{display:flex}
.celbox{background:white;border-radius:28px;padding:36px 28px;text-align:center;max-width:340px;
  animation:bounceIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@keyframes bounceIn{0%{transform:scale(.4)}70%{transform:scale(1.08)}100%{transform:scale(1)}}
.cele{font-size:3.5rem;margin-bottom:10px}
.celt{font-size:1.4rem;font-weight:900;color:#333;margin-bottom:6px}
.cels{font-size:.95rem;color:#888;margin-bottom:18px}
.cp{position:fixed;pointer-events:none;z-index:201;animation:cfall 2s ease forwards;border-radius:2px}
@keyframes cfall{0%{transform:translateY(-80px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

#toast{display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:.9rem;
  z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3);text-align:center;max-width:300px;font-weight:700}

.div{height:2px;background:linear-gradient(90deg,transparent,#FFD166,transparent);margin:14px 0}

@media(max-width:480px){
  .cnav{width:43px;height:43px;font-size:1.1rem}
  .fgrid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>

<header>
  <h1>🐼 HanziHero!</h1>
  <div class="hdr-stats">
    <span>⭐ <span id="hStars">0</span> Stars</span>
    <span>✅ <span id="hMastered">0</span>/40 Mastered</span>
    <span>✏️ <span id="hWrite">0</span> Write ✓</span>
    <span>🎤 <span id="hSpeak">0</span> Speak ✓</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="chapters">📚 Chapters</button>
  <button class="tab" data-tab="learn">✏️ Learn</button>
  <button class="tab" data-tab="games">🎮 Games</button>
  <button class="tab" data-tab="progress">🏆 Progress</button>
</div>

<div class="content">
  <div id="pane-chapters" class="pane active"></div>
  <div id="pane-learn" class="pane">
    <p style="text-align:center;color:#aaa;padding:40px 0">Pick a chapter to start! 👆</p>
  </div>
  <div id="pane-games" class="pane"></div>
  <div id="pane-progress" class="pane"></div>
</div>

<div class="modal" id="gameModal">
  <div class="mbox">
    <button class="mclose" onclick="closeGame()">✕</button>
    <div id="gameContent"></div>
  </div>
</div>

<div class="cel" id="cel">
  <div class="celbox">
    <div class="cele" id="celE">🎉</div>
    <div class="celt" id="celT">Amazing!</div>
    <div class="cels" id="celS">Keep going!</div>
    <button class="nbtn" onclick="closeCel()">Awesome! 🚀</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const CHAPTERS = [
  {id:0,title:'Chapter 1',emoji:'🌱',chars:['田','刀','在','上','下','大','小','来']},
  {id:1,title:'Chapter 2',emoji:'🔥',chars:['开','火','关','两','长','广','多','少']},
  {id:2,title:'Chapter 3',emoji:'👁️',chars:['目','手','本','工','门','见','又','头']},
  {id:3,title:'Chapter 4',emoji:'🐄',chars:['牛','贝','六','支','九','什','么','文']},
  {id:4,title:'Chapter 5',emoji:'🌙',chars:['月','天','水','寸','正','反','白','古']}
];

const CD = {
  '田':{py:'tián',t:2,en:'Field',emoji:'🌾',tip:'Looks like a rice paddy divided into sections!'},
  '刀':{py:'dāo',t:1,en:'Knife',emoji:'🔪',tip:'Like a bent blade!'},
  '在':{py:'zài',t:4,en:'At / Here',emoji:'📍',tip:'Used to say WHERE something is!'},
  '上':{py:'shàng',t:4,en:'Up / Above',emoji:'⬆️',tip:'A line ABOVE — pointing up!'},
  '下':{py:'xià',t:4,en:'Down / Below',emoji:'⬇️',tip:'A line BELOW — pointing down!'},
  '大':{py:'dà',t:4,en:'Big',emoji:'🦣',tip:'A big person with arms spread wide!'},
  '小':{py:'xiǎo',t:3,en:'Small',emoji:'🐜',tip:'A tiny squeeze in the middle!'},
  '来':{py:'lái',t:2,en:'Come',emoji:'🚶',tip:'Someone is COMING toward you!'},
  '开':{py:'kāi',t:1,en:'Open',emoji:'🚪',tip:'Opening a gate wide!'},
  '火':{py:'huǒ',t:3,en:'Fire',emoji:'🔥',tip:'Flames dancing upward!'},
  '关':{py:'guān',t:1,en:'Close',emoji:'🔒',tip:'Closing the gate shut!'},
  '两':{py:'liǎng',t:3,en:'Two / Both',emoji:'✌️',tip:'Two things standing together!'},
  '长':{py:'cháng',t:2,en:'Long',emoji:'📏',tip:'Something stretching out long!'},
  '广':{py:'guǎng',t:3,en:'Wide',emoji:'🌅',tip:'A wide open shelter roof!'},
  '多':{py:'duō',t:1,en:'Many',emoji:'✨✨',tip:'Two evenings — so many!'},
  '少':{py:'shǎo',t:3,en:'Few',emoji:'🫧',tip:'Just a tiny little bit!'},
  '目':{py:'mù',t:4,en:'Eye',emoji:'👁️',tip:'A rectangle with two pupils — an eye!'},
  '手':{py:'shǒu',t:3,en:'Hand',emoji:'✋',tip:'Three fingers and a palm!'},
  '本':{py:'běn',t:3,en:'Root / Book',emoji:'📚',tip:'A tree with its roots marked!'},
  '工':{py:'gōng',t:1,en:'Work',emoji:'🔨',tip:'Like an I-beam for building!'},
  '门':{py:'mén',t:2,en:'Door',emoji:'🚪',tip:'Two door panels side by side!'},
  '见':{py:'jiàn',t:4,en:'See',emoji:'👀',tip:'An eye on legs — going to SEE!'},
  '又':{py:'yòu',t:4,en:'Again',emoji:'🔄',tip:'One more time — again!'},
  '头':{py:'tóu',t:2,en:'Head',emoji:'🗣️',tip:'Your head on top of your body!'},
  '牛':{py:'niú',t:2,en:'Cow',emoji:'🐄',tip:'A cow with horns!'},
  '贝':{py:'bèi',t:4,en:'Shell',emoji:'🐚',tip:'Ancient shells used as money!'},
  '六':{py:'liù',t:4,en:'Six',emoji:'6️⃣',tip:'Six — sounds like lyoh!'},

function save(){
  localStorage.setItem('hzS',JSON.stringify(S));
  localStorage.setItem('hzSt',stars);
  updateHdr();
}

function status(c){
  const s=S[c]||{};
  if(s.w&&s.s) return 'mastered';
  if(s.w||s.s) return 'partial';
  return 'none';
}

function updateHdr(){
  const all=Object.keys(CD);
  document.getElementById('hStars').textContent=stars;
  document.getElementById('hMastered').textContent=all.filter(c=>status(c)==='mastered').length;
  document.getElementById('hWrite').textContent=all.filter(c=>S[c]?.w).length;
  document.getElementById('hSpeak').textContent=all.filter(c=>S[c]?.s).length;
}

function init(){
  updateHdr();
  renderChs();

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('pane-'+t.dataset.tab).classList.add('active');
      if(t.dataset.tab==='learn'&&curCh) renderLearn();
      if(t.dataset.tab==='progress') renderProg();

}

function goTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));

  document.getElementById('pane-'+name).classList.add('active');

// ═══════════════════════════════════════
// HANZI WRITER — dynamic load
// ═══════════════════════════════════════
let HW = null; // HanziWriter global ref

function loadHanziWriter(cb){
  if(HW){ cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js';
  s.onload = () => { HW = window.HanziWriter; cb(); };
  s.onerror = () => {
    // Try alternate CDN
    const s2 = document.createElement('script');
    s2.src = 'https://unpkg.com/hanzi-writer@3.5.0/dist/hanzi-writer.min.js';
    s2.onload = () => { HW = window.HanziWriter; cb(); };
    s2.onerror = () => showToast('⚠️ Could not load Hanzi Writer. Check your internet connection.');
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

function hzLoader(char, onLoad, onError){
  const urls = [
    `https://cdn.jsdelivr.net/npm/hanzi-writer-data@latest/${encodeURIComponent(char)}.json`,
    `https://unpkg.com/hanzi-writer-data@latest/${encodeURIComponent(char)}.json`
  ];
  function tryUrl(i){
    if(i>=urls.length){ onError(); return; }
    fetch(urls[i]).then(r=>{ if(!r.ok) throw 0; return r.json(); }).then(onLoad).catch(()=>tryUrl(i+1));
  }
  tryUrl(0);
}

function initWatch(char){
  loadHanziWriter(()=>{
    const el=document.getElementById('watchBox');
    if(!el||!HW) return;
    try {
      watchW = HW.create('watchBox', char, {
        width:214, height:214, padding:14,
        showOutline:true, strokeColor:'#1A1A2E', outlineColor:'#E0D0FF',
        strokeAnimationSpeed:1.2, delayBetweenStrokes:450,
        charDataLoader: hzLoader
      });
    } catch(e){ console.log('Watch error',e); }
  });
}

function initQuiz(char){
  loadHanziWriter(()=>{
    const el=document.getElementById('quizBox');
    if(!el||!HW) return;
    qDone=0; qTotal=0;
    try {
      quizW = HW.create('quizBox', char, {
        width:214, height:214, padding:14,
        showOutline:true, showCharacter:false,
        strokeColor:'#845EC2', outlineColor:'#E0D0FF',
        highlightColor:'#06D6A0', drawingColor:'#845EC2', drawingWidth:5,
        showHintAfterMisses:3, highlightOnComplete:true,
        charDataLoader: hzLoader,
        onLoadCharDataSuccess:(data)=>{
          qTotal=data.strokes.length;
          updQProg();
          beginQuiz(char);
        },
        onLoadCharDataError:()=>{
          const s=document.getElementById('sstatus');
          if(s){ s.textContent='⚠️ Stroke data unavailable. Check your internet!'; s.className='sstatus bad'; }
        }
      });
    } catch(e){ console.log('Quiz error',e); }
  });
}

function beginQuiz(char){
  if(!quizW) return;
  quizW.quiz({
    onMistake:(d)=>{
      const s=document.getElementById('sstatus');
      if(s){
        s.className='sstatus bad';
        s.textContent=`❌ Wrong direction! Stroke ${d.strokeNum+1} — try again! (${d.mistakesOnStroke} mistake${d.mistakesOnStroke>1?'s':''})`;
      }
    },
    onCorrectStroke:(d)=>{
      qDone=d.strokeNum+1; updQProg();
      const s=document.getElementById('sstatus');
      if(s){
        s.className='sstatus ok';
        s.textContent=`✅ Stroke ${qDone} correct! ${qDone<qTotal?'Keep going!':'Almost there!'}`;
      }
    },
    onComplete:()=>{
      const c=curCh.chars[curIdx], d=CD[c];
      const s=document.getElementById('sstatus');
      if(s){ s.className='sstatus done'; s.textContent=`🎉 All ${qTotal} strokes correct! "${c}" written perfectly!`; }
      if(!S[c]?.w){
        if(!S[c]) S[c]={};
        S[c].w=true; stars++;
        save(); renderChs();
        showCel('✏️ Write Test Passed!',`You wrote ${c} (${d.py}) with correct strokes! Now try the Speak Test! 🎤`,'🎊');
        setTimeout(()=>{ renderNav(); renderChar(); }, 2500);
      }
    }
  });
}

function doAnim(){ if(watchW) watchW.animateCharacter(); }
function doLoop(){ if(watchW) watchW.loopCharacterAnimation(); }
function doHint(){ if(quizW) quizW.showHint(); }
function resetQ(){
  if(!quizW) return;
  qDone=0; updQProg();
  quizW.cancelQuiz();
  const s=document.getElementById('sstatus');
  if(s){ s.className='sstatus hint'; s.textContent='✏️ Draw the 1st stroke in the correct direction!'; }
  setTimeout(()=>beginQuiz(curCh.chars[curIdx]),120);
}
function updQProg(){
  const p=document.getElementById('qprog');
  if(p&&qTotal>0) p.textContent=`Strokes completed: ${qDone} / ${qTotal}`;
}

function spk(char, slow=false){
  const a=new Audio();
  a.src=`https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=zh-CN&client=gtx&q=${encodeURIComponent(char)}`;
  a.playbackRate=slow?.6:1;
  a.play().catch(()=>{
    if(!window.speechSynthesis){ showToast('⚠️ No audio support. Try Chrome!'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(char);
    u.lang='zh-CN'; u.rate=slow?.4:.85;
    const v=window.speechSynthesis.getVoices().find(x=>x.lang.startsWith('zh'));
    if(v) u.voice=v;
    u.onerror=()=>showToast('⚠️ No Chinese voice. Install Chinese language in system settings.');
    window.speechSynthesis.speak(u);
  });
}

// ═══════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════
function toggleRec(char, py, en){
  isRec ? stopRec() : startRec(char, py, en);
}

function startRec(char, py, en){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('⚠️ Speech recognition needs Chrome on desktop/Android!'); return; }

  speechR=new SR();
  speechR.lang='zh-CN';
  speechR.continuous=false;
  speechR.interimResults=false;
  speechR.maxAlternatives=8;

  const btn=document.getElementById('recBtn');
  const res=document.getElementById('rresult');
  if(btn){ btn.textContent='🔴 Listening... (tap to stop)'; btn.classList.add('rec'); }
  if(res){ res.className='rresult wait'; res.innerHTML='🎧 Listening for your Chinese...'; res.style.display=''; }
  isRec=true;

  speechR.onresult=(e)=>{
    // Collect all alternatives
    let heardList=[];
    for(let i=0;i<e.results.length;i++){
      for(let j=0;j<e.results[i].length;j++){
        heardList.push(e.results[i][j].transcript.trim());
      }
    }
    if(heardList.length) processRec(heardList, char, py, en);
  };

  speechR.onerror=(e)=>{
    isRec=false;
    if(btn){ btn.textContent='🎤 Tap to Record'; btn.classList.remove('rec'); }
    const msgs={'no-speech':'No speech heard — speak louder!','not-allowed':'Microphone blocked! Allow mic in browser.','network':'Network error — check connection.'};
    if(res){ res.className='rresult fail'; res.innerHTML='⚠️ '+(msgs[e.error]||'Could not hear you. Try again!'); }
  };
  speechR.onend=()=>{ isRec=false; if(btn){ btn.textContent='🎤 Tap to Record Again'; btn.classList.remove('rec'); } };
  speechR.start();
}

function stopRec(){ if(speechR) speechR.stop(); isRec=false; }

function normTone(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s/g,''); }

function processRec(heardList, char, py, en){
  const res=document.getElementById('rresult');
  if(!res) return;
  const mainHeard=heardList[0];
  const normPy=normTone(py);

  // Check all alternatives
  const pass=heardList.some(h=>{
    const hl=h.toLowerCase().trim();
    const hn=normTone(h);
    return (
      hl.includes(char) ||          // said the actual character
      hn.includes(normPy) ||        // pinyin match (no tones)
      normPy.includes(hn) ||
      en.toLowerCase().split('/').some(m=>hl.includes(m.trim())) // English meaning
    );
  });

  if(pass){
    res.className='rresult pass';
    res.innerHTML=`<span style="font-size:1.8rem">🎉</span><br>
      <strong>Great pronunciation!</strong><br>
      <span style="font-size:.85rem;opacity:.8">I heard: "${mainHeard}"</span><br>
      <span style="font-size:.85rem">✅ Matches ${char} = ${py}</span>`;
    const c=curCh.chars[curIdx], d=CD[c];
    if(!S[c]?.s){
      if(!S[c]) S[c]={};
      S[c].s=true;
      const nowMastered=S[c].w&&S[c].s;
      stars += nowMastered ? 2 : 1;
      save(); renderChs();
      if(nowMastered){
        setTimeout(()=>{
          showCel(`⭐ MASTERED ${c}!`,`You can write AND say ${c} (${d.py})! +2 Stars! 🌟`,'🌟');
          renderNav(); renderChar();
        }, 1600);
      } else {
        setTimeout(()=>{ renderNav(); renderChar(); }, 1800);
      }
    }
  } else {
    res.className='rresult fail';
    res.innerHTML=`<span style="font-size:1.4rem">😅</span> <strong>Not quite!</strong><br>
      I heard: "<em>${mainHeard}</em>"<br>
      <span style="font-size:.85rem">Try saying <strong style="color:var(--primary)">${py}</strong> for ${char} (${en})</span><br>
      <span style="font-size:.78rem;color:#bbb">Listen again then try once more 👆</span>`;
  }
}

function startGame(type){ GS={type,score:0,streak:0}; document.getElementById('gameModal').classList.add('open'); renderGame(type); }
function closeGame(){ document.getElementById('gameModal').classList.remove('open'); }

function renderGame(type){
  const gc=document.getElementById('gameContent');
  const chars=Object.keys(CD);
  const char=chars[Math.floor(Math.random()*chars.length)];
  const d=CD[char]; GS.cur=char;
  const sc=`<div class="gscore">Score: ${GS.score} &nbsp; Streak: ${GS.streak}🔥</div>`;

  if(type==='match'){
    const wrong=chars.filter(c=>c!==char).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[char,...wrong].sort(()=>Math.random()-.5);
    gc.innerHTML=`<div class="gtitle">🎯 Match It!</div>${sc}
      <div style="font-size:.88rem;color:#888;margin-bottom:8px">What does this mean?</div>
      <div class="gchar" onclick="spk('${char}')">${char} <span style="font-size:1rem">🔊</span></div>
      <div style="text-align:center;font-size:.78rem;color:#bbb;margin-bottom:10px">Tap to hear</div>
      <div class="gopts">${opts.map(c=>`<button class="gopt" onclick="chkM(this,'${c}','${char}')">${CD[c].emoji} ${CD[c].en.split('/')[0]}</button>`).join('')}</div>
      <div id="gr"></div>`;
  } else if(type==='find'){
    const wrong=chars.filter(c=>c!==char).sort(()=>Math.random()-.5).slice(0,7);
    const opts=[char,...wrong].sort(()=>Math.random()-.5);
    gc.innerHTML=`<div class="gtitle">🔍 Find It!</div>${sc}
      <div style="background:#FFF8E8;border-radius:14px;padding:12px;border:2px dashed var(--secondary);text-align:center;margin-bottom:14px;font-weight:700;color:#555">
        Find: <strong style="color:var(--primary);font-size:1.2rem">${d.emoji} ${d.en.split('/')[0]}</strong><br>
        <span style="font-size:.85rem;color:#888">Pinyin: ${d.py}</span>
      </div>
      <div class="fgrid">${opts.map(c=>`<div class="fopt" onclick="chkF(this,'${c}','${char}')">${c}</div>`).join('')}</div>
      <div id="gr"></div>`;
  } else if(type==='pinyin'){
    const allP=[...new Set(Object.values(CD).map(x=>x.py))].filter(p=>p!==d.py).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[d.py,...allP].sort(()=>Math.random()-.5);
    gc.innerHTML=`<div class="gtitle">🎵 Pinyin Pick!</div>${sc}
      <div style="font-size:.88rem;color:#888;margin-bottom:8px">How do you say this character?</div>
      <div class="gchar" onclick="spk('${char}')">${char} <span style="font-size:1rem">🔊</span></div>
      <div style="text-align:center;font-size:.78rem;color:#bbb;margin-bottom:10px">Tap to hear</div>
      <div class="gopts">${opts.map(p=>`<button class="gopt" style="font-size:1.15rem;font-weight:800" onclick="chkP(this,'${p}','${d.py}','${char}')">${p}</button>`).join('')}</div>
      <div id="gr"></div>`;
  } else if(type==='flash'){
    gc.innerHTML=`<div class="gtitle">⚡ Flash Cards!</div>${sc}
      <div style="font-size:.88rem;color:#888;margin-bottom:8px">What does this mean? Think first!</div>
      <div class="gchar" onclick="spk('${char}')">${char}</div>
      <div style="text-align:center;font-size:.78rem;color:#bbb;margin-bottom:14px">Tap to hear pronunciation</div>
      <button onclick="revealF('${char}')" class="nbtn" style="background:var(--purple);box-shadow:0 4px 0 #5E3D96">🔮 Reveal Answer!</button>
      <div id="gr"></div>`;
  }
}

function chkM(btn,chosen,correct){
  document.querySelectorAll('.gopt').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('ok');GS.score++;GS.streak++;gRes(true,correct);}
  else{btn.classList.add('bad');GS.streak=0;document.querySelectorAll('.gopt').forEach(b=>{if(b.textContent.includes(CD[correct].en.split('/')[0]))b.classList.add('ok');});gRes(false,correct);}
}
function chkF(el,chosen,correct){
  document.querySelectorAll('.fopt').forEach(b=>b.style.pointerEvents='none');
  if(chosen===correct){el.classList.add('ok');GS.score++;GS.streak++;gRes(true,correct);}
  else{el.classList.add('bad');GS.streak=0;document.querySelectorAll('.fopt').forEach(b=>{if(b.textContent===correct)b.classList.add('ok');});gRes(false,correct);}
}
function chkP(btn,chosen,correct,char){
  document.querySelectorAll('.gopt').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('ok');GS.score++;GS.streak++;gRes(true,char);}
  else{btn.classList.add('bad');GS.streak=0;document.querySelectorAll('.gopt').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('ok');});gRes(false,char);}
}
function revealF(char){
  const d=CD[char];
  document.getElementById('gr').innerHTML=`
    <div style="background:#FFF8E8;border-radius:14px;padding:14px;margin:12px 0;border:2px solid var(--secondary);text-align:center">
      <div style="font-size:2rem">${d.emoji}</div>
      <div style="font-size:1.2rem;font-weight:800">${d.en}</div>
      <div style="color:var(--primary);font-weight:700">${d.py}</div>
    </div>
    <div style="font-weight:700;color:#555;text-align:center;margin-bottom:10px">Did you know it?</div>
    <div style="display:flex;gap:8px">
      <button onclick="flashA(true)" style="flex:1;background:var(--green);color:white;border:none;border-radius:12px;padding:12px;font-family:'Baloo 2';font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 3px 0 #04A07A">✅ Yes!</button>
      <button onclick="flashA(false)" style="flex:1;background:var(--red);color:white;border:none;border-radius:12px;padding:12px;font-family:'Baloo 2';font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 3px 0 #A0001C">❌ No</button>
    </div>`;
}
function flashA(ok){ if(ok){GS.score++;GS.streak++;}else GS.streak=0; gRes(ok,GS.cur); }
function gRes(pass,char){
  const d=CD[char], el=document.getElementById('gr');
  if(!el) return;
  if(pass){
    el.innerHTML=`<div class="gres pass"><span class="be">${['🎉','⭐','🌟','🥳','✨'][Math.floor(Math.random()*5)]}</span>
      Correct! ${char} = ${d.en} (${d.py})<br><small>Score: ${GS.score} | Streak: ${GS.streak}🔥</small>
    </div><button class="nbtn" onclick="renderGame('${GS.type}')">Next ➜</button>`;
    if(GS.streak>0&&GS.streak%5===0) spawnC();
  } else {
    el.innerHTML=`<div class="gres fail"><span class="be">😅</span>
      ${char} = ${d.en} (${d.py}) — keep practicing!
    </div><button class="nbtn" onclick="renderGame('${GS.type}')">Try Again ➜</button>`;
  }
}

// ═══════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════
function renderProg(){
  const all=Object.keys(CD), mastered=all.filter(c=>status(c)==='mastered').length;
  const pct=Math.round(mastered/all.length*100);
  document.getElementById('pane-progress').innerHTML=`
    <div class="psec">
      <div class="pstitle">🏆 Overall Progress</div>
      <div style="font-size:1rem;color:#555">Mastered <strong style="color:var(--primary)">${mastered}</strong> / 40</div>
      <div class="prog-bar" style="margin:10px 0;height:14px;border-radius:10px">
        <div class="prog-fill" style="width:${pct}%;height:14px"></div>
      </div>
      <div style="font-size:.82rem;color:#aaa">${pct}% &nbsp;|&nbsp; ⭐ ${stars} stars &nbsp;|&nbsp; ✏️ ${all.filter(c=>S[c]?.w).length} write &nbsp;|&nbsp; 🎤 ${all.filter(c=>S[c]?.s).length} speak</div>
      <div style="font-size:.78rem;margin-top:8px;color:#ccc">
        <span style="color:#845EC2">■</span> Write ✓ &nbsp;
        <span style="color:#D4A000">■</span> Speak ✓ &nbsp;
        <span style="color:var(--green)">■</span> Mastered ⭐ &nbsp;
        <span style="color:#ddd">■</span> Not started
      </div>
    </div>
    ${CHAPTERS.map(ch=>{
      const done=ch.chars.filter(c=>status(c)==='mastered').length;
      return `<div class="psec">
        <div class="pstitle">${ch.emoji} ${ch.title}</div>
        <div class="cdots">${ch.chars.map(c=>{
          const sv=S[c]||{};
          const cl=sv.w&&sv.s?'both':sv.w?'wonly':sv.s?'sonly':'';
          const ic=sv.w&&sv.s?'⭐':sv.w?'✏️':sv.s?'🎤':'';
          return `<div class="cdot ${cl}" title="${CD[c].en} (${CD[c].py})">${c}<small>${ic}</small></div>`;
        }).join('')}</div>
        <div class="prog-bar" style="margin-top:10px;height:9px;border-radius:9px">
          <div class="prog-fill" style="width:${Math.round(done/8*100)}%"></div>
        </div>
        <div style="font-size:.8rem;color:#aaa;margin-top:4px">${done}/8 mastered</div>
      </div>`;
    }).join('')}
    <div style="text-align:center;padding:14px">
      <button onclick="if(confirm('Reset ALL progress?')){S={};stars=0;save();renderChs();renderProg();}"
        style="background:white;border:2px solid #ddd;border-radius:12px;padding:8px 16px;font-family:'Baloo 2';font-size:.85rem;cursor:pointer;color:#ccc">
        🔄 Reset Progress
      </button>
    </div>`;
}

// ═══════════════════════════════════════
// CELEBRATION
// ═══════════════════════════════════════
function showCel(title,sub,emoji='🎉'){
  document.getElementById('celT').textContent=title;
  document.getElementById('celS').textContent=sub;
  document.getElementById('celE').textContent=emoji;
  document.getElementById('cel').classList.add('show');
  spawnC();
}
function closeCel(){
  document.getElementById('cel').classList.remove('show');
  document.querySelectorAll('.cp').forEach(c=>c.remove());
}
function spawnC(){
  const cols=['#FF6B35','#FFD166','#06D6A0','#118AB2','#845EC2','#FF9EBB','#EF233C'];
  for(let i=0;i<50;i++) setTimeout(()=>{
    const p=document.createElement('div');
    p.className='cp';
    p.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${1.4+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  },i*32);
}

function showToast(msg,dur=4000){
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',dur);
}

init();
</script>
</body>
</html>
